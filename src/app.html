<!DOCTYPE html>
<html lang="%lang%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="color-scheme" content="light dark coffee" />
    <meta name="author" content="Rafael Freitas" />
    <meta name="og:type" content="website" />
    <meta name="og:title" content="Rafael Passoca | Frontend Engineer" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@httpassoca" />

    <!-- dssoca design-system fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Electrolize&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap"
    />
    %sveltekit.head%
  </head>

  <body>
    <div id="svelte">%sveltekit.body%</div>
    <script>
      // Theme boot
      const localTheme = localStorage.getItem("theme");
      const theme = localTheme || "dark";
      document.body.dataset.theme = theme;
      localStorage.setItem("theme", theme);

      // locale is set server-side via %lang% + paraglide middleware
    </script>
  </body>
</html>
