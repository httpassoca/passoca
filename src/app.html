<!DOCTYPE html>
<html lang="%lang%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta name="color-scheme" content="dark light" />
    <meta name="author" content="Rafael Freitas" />
    <meta name="og:type" content="website" />
    <meta name="og:title" content="Rafael Passoca | Frontend Engineer" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:creator" content="@httpassoca" />

    <!-- dssoca design-system fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Electrolize&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap"
    />
    <link rel="icon" href="/favicons/dark-logo.svg" />
    <script>
      // Theme boot — runs in <head> so attributes land before first paint.
      // Ids/modes mirror THEMES in src/lib/stores/theme.store.ts (inline
      // scripts can't import; keep the two in sync). The favicon link above
      // is also updated by the theme store on later changes.
      (function () {
        var MODES = {
          dark: "dark",
          light: "light",
          coffee: "light",
          dracula: "dark",
          "tokyo-night": "dark",
          gruvbox: "dark",
          nord: "dark",
          solarized: "dark",
        };
        var t = localStorage.getItem("theme");
        if (!MODES[t]) t = "dark";
        var el = document.documentElement;
        el.dataset.theme = MODES[t];
        if (t === "dark" || t === "light") delete el.dataset.palette;
        else el.dataset.palette = t;
        localStorage.setItem("theme", t);
        var logo = t === "coffee" ? "coffee" : MODES[t];
        document.querySelector("link[rel=icon]").href = "/favicons/" + logo + "-logo.svg";
      })();
    </script>
    %presets.css%
    %sveltekit.head%
  </head>

  <body>
    <div id="svelte">%sveltekit.body%</div>
    <!-- locale is set server-side via %lang% + paraglide middleware -->
  </body>
</html>
